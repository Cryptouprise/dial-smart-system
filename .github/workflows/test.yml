name: Certification gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '23 9 * * *'

permissions:
  contents: read

concurrency:
  group: certification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-quality:
    name: Static quality and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Reject new ESLint errors
        run: npm run lint:errors
      - name: Frontend typecheck
        run: npm run typecheck
      - name: Reject migration version collisions
        run: npm run check:migrations
      - name: Production build
        run: npm run build

  unit-tests:
    name: Unit tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/4', '2/4', '3/4', '4/4']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run deterministic Vitest shard
        run: npm test
        env:
          VITEST_SHARD: ${{ matrix.shard }}

  edge-typecheck:
    name: Deno edge-function typecheck
    runs-on: ubuntu-latest
    env:
      EDGE_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check changed functions (full inventory nightly/manual)
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "schedule" || "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            npm run typecheck:edge
          else
            npm run typecheck:edge:changed -- "$EDGE_BASE_SHA"
          fi

  browser-smoke:
    name: Browser smoke (Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run browser smoke tests
        run: npm run test:e2e:smoke
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
