name: MCP Contracts + API Gateway Typecheck

permissions:
  contents: read

on:
  push:
    paths:
      - "mcp-server/**"
      - "supabase/functions/api-gateway/**"
      - "supabase/functions/_shared/api-auth.ts"
      - "supabase/functions/_shared/api-auth.test.ts"
      - "supabase/functions/_shared/tenant-context.ts"
      - "supabase/functions/_shared/utils.ts"
      - "supabase/functions/sms-messaging/sms-boundary.ts"
      - "supabase/migrations/20260409020305_api_keys.sql"
      - ".github/workflows/mcp-api-tests.yml"
  pull_request:
    paths:
      - "mcp-server/**"
      - "supabase/functions/api-gateway/**"
      - "supabase/functions/_shared/api-auth.ts"
      - "supabase/functions/_shared/api-auth.test.ts"
      - "supabase/functions/_shared/tenant-context.ts"
      - "supabase/functions/_shared/utils.ts"
      - "supabase/functions/sms-messaging/sms-boundary.ts"
      - "supabase/migrations/20260409020305_api_keys.sql"
      - ".github/workflows/mcp-api-tests.yml"

jobs:
  mcp-server:
    name: MCP server (Node + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Reject dependency vulnerabilities
        run: npm audit

      - name: Type-check + build
        run: npm run build

      - name: Unit tests
        run: npm test

  api-gateway-shared:
    name: API auth contracts + gateway typecheck (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno unit tests
        run: deno test --config certification/deno.json --frozen --allow-net=none supabase/functions/_shared/api-auth.test.ts

      - name: Deno type check api-gateway
        run: deno check --config certification/deno.json --frozen supabase/functions/api-gateway/index.ts
