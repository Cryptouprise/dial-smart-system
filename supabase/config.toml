[functions.elite-solar-preflight]
# R0 server-owned readiness reader. In addition to JWT verification, the
# handler requires an exact configured Elite owner, exact dashboard origin,
# explicit enablement, and performs only bounded official-provider GET probes.
verify_jwt = true

[functions.elite-email-release-registration]
# Authenticated, exact-owner registration of a signed no-PII Elite Solar
# release. The handler also requires exact origin, exact tenant/campaign, and
# an enabled server-only HMAC key. It never prepares, claims, sends, imports,
# or invokes an email provider.
verify_jwt = true

[functions.elite-email-release-preparation]
# Exact-owner signed no-PII source/suppression attestation verifier. Disabled
# until all server-only tenant, origin, Ed25519 public-key, and database
# configuration exists; it cannot call a provider.
verify_jwt = true

[functions.elite-email-release-status]
# Exact-owner, no-PII ledger status summary. Disabled until the release ledger
# is migrated and its exact tenant/origin configuration is provisioned.
verify_jwt = true

[functions.elite-email-mailgun-events]
# Mailgun cannot present a Supabase JWT. The handler remains disabled unless a
# release-specific binding and both server-only HMAC keys exist. Once enabled,
# it accepts only signed event receipts and cannot send, import, or mutate a
# suppression list.
verify_jwt = false

