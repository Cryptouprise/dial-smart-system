[functions.ai-assistant]
# Launch-quarantined before service-role/LLM construction. Legacy provider
# inventory and mutation tools still use account-global credentials.
verify_jwt = true

[functions.generate-daily-report]
# Launch-quarantined before service-role reads or AI spend. A future user path
# must bind the JWT to one organization; batch generation needs an exact token.
